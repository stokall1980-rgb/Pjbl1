<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Photobooth Online</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📸 Retro Photobooth</h1>
        
        <div class="booth-wrapper">
            <div class="camera-box">
                <video id="video" autoplay playsinline></video>
                <div id="countdown"></div>
                <button id="snap">Ambil 4 Foto!</button>
            </div>

            <div class="result-box">
                <h3>Hasil Strip:</h3>
                <div id="photo-strip" class="strip">
                    </div>
                <button id="download" style="display:none;">Download Strip</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
